name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - 'metro.config.js'
      - 'babel.config.js'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Pick newest Xcode version available on this runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          # Require iOS 26 SDK for App Store upload
          SDK=$(xcodebuild -showsdks 2>/dev/null | grep iphoneos | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          MAJOR=$(echo "$SDK" | cut -d. -f1)
          echo "iOS SDK: $SDK (major: $MAJOR)"
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::This runner has iOS $SDK SDK. Apple requires iOS 26+. Re-run to get a different runner."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli eas-cli

      - name: Install provisioning profile
        env:
          NANOCLAW_PROVISION_BASE64: ${{ secrets.NANOCLAW_PROVISION_BASE64 }}
          NANOCLAW_PROVISION_UUID: ${{ secrets.NANOCLAW_PROVISION_UUID }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$NANOCLAW_PROVISION_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/${NANOCLAW_PROVISION_UUID}.mobileprovision

      - name: Install distribution certificate
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          P12_PATH=$RUNNER_TEMP/dist.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$IOS_P12_BASE64" | base64 --decode > $P12_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $P12_PATH -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          NANOCLAW_PROVISION_NAME: ${{ secrets.NANOCLAW_PROVISION_NAME }}
        run: |
          xcodebuild -workspace ios/NanoClawControl.xcworkspace \
            -scheme NanoClawControl \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/NanoclawControl.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$NANOCLAW_PROVISION_NAME" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain" \
            archive

      - name: Export IPA
        env:
          NANOCLAW_PROVISION_NAME: ${{ secrets.NANOCLAW_PROVISION_NAME }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nanoluke.nanoclawcontrol</key>
              <string>${NANOCLAW_PROVISION_NAME}</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NanoclawControl.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file $(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1) \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose
